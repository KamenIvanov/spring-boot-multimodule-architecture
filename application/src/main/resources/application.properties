server.servlet.application-display-name=Multimodule Service
spring.application.name=multi-module
server.port=8080
server.servlet.context-path=/api
springdoc.api-docs.path=/api-docs
spring.threads.virtual.enabled=true

# Datasource configuration
spring.jpa.database=mysql
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=multimodule-connection-pool
spring.datasource.hikari.initialization-fail-timeout=-1

spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useSSL=false

# Fix the pool size to prevent dynamic resizing overhead during traffic spikes
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=25

# Keep connections alive longer to minimize connection churn
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Aggressive connection timeout to fail fast under heavy thread contention
spring.datasource.hikari.connection-timeout=5000

# Management endpoints config
management.server.port=8081
management.server.address=127.0.0.1
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health,info,prometheus,logfile,beans,env,loggers,loggers-name,heapdump,threaddump,metrics,metrics-requiredMetricName,mappings

# Info endpoint config
management.endpoint.info.access=read_only
management.endpoint.logfile.external-file=/runtime/logs/multmodule.log

# Health endpoint config
management.endpoint.health.access=read_only
management.endpoint.health.show-components=always
management.endpoint.health.show-details=always

management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true

management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=*
management.endpoint.health.group.startup.include=ping

# Logfile endpoint config
management.endpoint.logfile.access=read_only

# Prometheus config
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.descriptions=true
management.prometheus.metrics.export.enabled=true
management.prometheus.metrics.export.step=1s
management.defaults.metrics.export.enabled=true
management.metrics.enable.all=true

#spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration,org.springdoc.core.configuration.SpringDocDataRestConfiguration

# Logging
logging.level.org.apache=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate.SQL=ERROR

# Files uploading
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable response compression
server.compression.enabled=true

# The comma-separated list of mime types that should be compressed
server.compression.mime-types=application/json

# Compress the response only if the response size is at least 1KB
server.compression.min-response-size=1024

# Enable HTTP/2 support, if the current environment supports it
server.http2.enabled=true

